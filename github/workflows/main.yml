name: TradingBot
on:
  schedule:
    - cron: '0 * * * *' # هەموو کاتژمێرێک جارێک
  workflow_dispatch: # بۆ ئەوەی خۆت بە دەستیش بتوانی ئیشی پێ بکەیت

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Trading Logic
        run: python bot.py
